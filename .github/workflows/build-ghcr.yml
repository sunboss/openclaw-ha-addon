name: Build and Push GHCR Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "build.yaml"
      - "config.yaml"
      - "repository.yaml"
      - "run.sh"
      - "translations/**"
      - "crates/**"
      - ".github/workflows/build-ghcr.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract add-on version
        id: meta
        shell: bash
        run: |
          VERSION="$(grep -E '^version:' config.yaml | head -1 | sed -E 's/version:\s*"([^"]+)"/\1/')"
          if [ -z "${VERSION}" ]; then
            echo "Failed to parse version from config.yaml" >&2
            exit 1
          fi
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/openclaw-ha-addon"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"
          echo "Using image: ${IMAGE}"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
            hass_arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
            hass_arch: aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: |
            BUILD_VERSION=${{ needs.meta.outputs.version }}
            BUILD_ARCH=${{ matrix.hass_arch }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}
            BUILD_REF=${{ github.sha }}
          tags: |
            ${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.version }}-${{ matrix.suffix }}
            ${{ needs.meta.outputs.image }}:latest-${{ matrix.suffix }}

  manifest:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          IMAGE="${{ needs.meta.outputs.image }}"

          docker buildx imagetools create \
            -t ${IMAGE}:${VERSION} \
            -t ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

      - name: Inspect published image
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          IMAGE="${{ needs.meta.outputs.image }}"
          docker buildx imagetools inspect ${IMAGE}:${VERSION}
